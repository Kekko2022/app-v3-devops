trigger:
  - main

pr: none

pool:
  name: self-hosted-pool

variables:
  azureServiceConnection: 'sc-obs-azure-rg'
  resourceGroupName: 'rg-observability-lab12-standalone'
  acrName: 'obsacrc830a3'
  imageName: 'obsapp-v3'
  imageTag: '$(Build.BuildId)'
  aciName: 'obsapp-v3-aci'
  aciDnsName: 'obsapp-francesco-devops-11'
  location: 'westeurope'
  containerPort: '8000'

stages:

# -------------------------
# BUILD
# -------------------------
- stage: Build
  displayName: Build and Push
  jobs:
  - job: BuildPush
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: Build and Push
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          Write-Host "Login ACR"
          az acr login --name $(acrName)

          $FULL_IMAGE_NAME = "$(acrName).azurecr.io/$(imageName):$(imageTag)"

          Write-Host "Build $FULL_IMAGE_NAME"
          docker build -t $FULL_IMAGE_NAME .

          Write-Host "Push $FULL_IMAGE_NAME"
          docker push $FULL_IMAGE_NAME

# -------------------------
# DEPLOY
# -------------------------
- stage: Deploy
  dependsOn: Build
  jobs:
  - job: DeployACI
    steps:
    - task: AzureCLI@2
      displayName: Deploy ACI
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          $FULL_IMAGE_NAME = "$(acrName).azurecr.io/$(imageName):$(imageTag)"

          Write-Host "Recupero credenziali ACR"
          $ACR_USER = az acr credential show --name $(acrName) --query username -o tsv
          $ACR_PASS = az acr credential show --name $(acrName) --query "passwords[0].value" -o tsv

          Write-Host "Elimino container vecchio"
          az container delete `
            --resource-group $(resourceGroupName) `
            --name $(aciName) `
            --yes

          Write-Host "Creo container"
          az container create `
            --resource-group $(resourceGroupName) `
            --name $(aciName) `
            --image $FULL_IMAGE_NAME `
            --cpu 1 `
            --memory 1.5 `
            --ports $(containerPort) `
            --ip-address Public `
            --dns-name-label $(aciDnsName) `
            --location $(location) `
            --registry-login-server "$(acrName).azurecr.io" `
            --registry-username $ACR_USER `
            --registry-password $ACR_PASS `
            --environment-variables PORT=$(containerPort) `
            --os-type Linux

# -------------------------
# SMOKE TEST (FIXED)
# -------------------------
- stage: SmokeTest
  dependsOn: Deploy
  jobs:
  - job: VerifyACI
    steps:
    - task: AzureCLI@2
      displayName: Smoke Test
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |

          Write-Host "Attendo container RUNNING..."

          $STATE = ""
          for ($i = 0; $i -lt 12; $i++) {
            $STATE = az container show `
              --resource-group $(resourceGroupName) `
              --name $(aciName) `
              --query instanceView.state `
              -o tsv

            Write-Host "Stato: $STATE"

            if ($STATE -eq "Running") {
              Write-Host "Container RUNNING"
              break
            }

            Start-Sleep -Seconds 10
          }

          if ($STATE -ne "Running") {
            Write-Host "Container NON RUNNING"
            az container logs `
              --resource-group $(resourceGroupName) `
              --name $(aciName)
            exit 1
          }

          # -------------------------
          # FQDN SAFE (FIX)
          # -------------------------
          Write-Host "Recupero FQDN..."
          $FQDN = az container show `
            --resource-group $(resourceGroupName) `
            --name $(aciName) `
            --query ipAddress.fqdn `
            -o tsv

          $FQDN = $FQDN.Trim()

          Write-Host "FQDN = '$FQDN'"

          if ([string]::IsNullOrWhiteSpace($FQDN)) {
            Write-Host "FQDN NON valido"
            az container logs `
              --resource-group $(resourceGroupName) `
              --name $(aciName)
            exit 1
          }

          $APP_URL = "http://$FQDN:$(containerPort)"
          Write-Host "APP_URL = $APP_URL"

          # -------------------------
          # WARMUP
          # -------------------------
          Start-Sleep -Seconds 10

          # -------------------------
          # TEST
          # -------------------------
          Write-Host "Test /health"
          Invoke-WebRequest "$APP_URL/health"

          Write-Host "Test /"
          Invoke-WebRequest "$APP_URL/"

          Write-Host "Test /time"
          Invoke-WebRequest "$APP_URL/time"

          Write-Host "Test POST /echo"
          Invoke-WebRequest "$APP_URL/echo" `
            -Method POST `
            -Body '{"lab":"02"}' `
            -ContentType "application/json"

          Write-Host "Logs container"
          az container logs `
            --resource-group $(resourceGroupName) `
            --name $(aciName)